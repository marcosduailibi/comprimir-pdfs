<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM Runner | ArqKit</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/favicon.svg" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f9fc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #cfe0f5;
        --primary: #2563eb;
        --ok: #16a34a;
        --warn: #d97706;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --surface: #111827;
          --text: #e5e7eb;
          --muted: #9ca3af;
          --border: #334155;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.5 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100% - 32px, 920px);
        margin: 0 auto;
        padding: 48px 0;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        color: var(--text);
        text-decoration: none;
        font-weight: 800;
        font-size: 1.4rem;
      }
      .logo {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        background:
          linear-gradient(145deg, #7dd3fc 0 31%, transparent 31%),
          linear-gradient(35deg, #60a5fa 0 50%, #0ea5e9 50% 100%);
        clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
        padding: 24px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 5vw, 3.4rem); line-height: 1.05; }
      p { color: var(--muted); margin: 0 0 18px; }
      button {
        border: 1px solid var(--primary);
        border-radius: 12px;
        background: var(--primary);
        color: #fff;
        min-height: 42px;
        padding: 0 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 10px;
        margin-top: 18px;
      }
      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .item span {
        display: block;
        color: var(--muted);
        font-size: 0.86rem;
      }
      .item strong[data-ok="true"] { color: var(--ok); }
      .item strong[data-ok="false"] { color: var(--warn); }
      pre {
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        background: color-mix(in srgb, var(--bg) 70%, var(--surface));
      }
    </style>
  </head>
  <body>
    <main>
      <a class="brand" href="./" aria-label="ArqKit">
        <span class="logo" aria-hidden="true"></span>
        <span>ArqKit</span>
      </a>
      <section class="card">
        <h1>WASM Runner</h1>
        <p>Esta pagina e usada para ferramentas pesadas do ArqKit. Ela permite recursos avancados do navegador quando os headers de isolamento estao ativos.</p>
        <button id="runDiagnostics" type="button">Testar compatibilidade</button>
        <div id="statusGrid" class="grid" aria-live="polite"></div>
        <pre id="diagnosticsJson" hidden></pre>
      </section>
    </main>
    <script type="module" src="./src/js/wasm-runner.js?v=1"></script>
  </body>
</html>
